apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: web-app

spec:
  type: helm
  domain: platform
  subscribe:
    environments:
      - development
      - staging
      - production
  inputs:
    version: "1.0.0"
    replicaCount: 2
    chart: oci://mycompany.azurecr.io/helm/charts/default
    imagePullPolicy: IfNotPresent
  labels:
    team: platform
    tier: frontend
  overrides:
    steps:
      - name: verify
        phase: post
        order: 10
        run: kubectl get deployment -n platform-web-app web-app
        onFailure: continue
  dependsOn:
    - component: common-services
      environment: ""
      scope: same-environment
      condition: success